<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ES-8 Interface</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-left">
            <span class="logo">ES-8</span>
            <span class="subtitle">Web Interface</span>
        </div>
        <div class="header-controls">
            <select id="device-select"><option value="">— select device —</option></select>
            <label class="sim-label">
                <input type="checkbox" id="sim-mode">
                <span>Sim</span>
            </label>
            <button id="connect-btn">Connect</button>
            <span id="status" class="status off" title="Disconnected">●</span>
            <label class="safe-label">
                <input type="checkbox" id="safe-mode" checked>
                <span>Safe 0–5V</span>
            </label>
            <button id="panic-btn" class="panic-btn">PANIC</button>
        </div>
    </header>

    <main>
        <div id="channels" class="channels-grid"></div>

        <section class="sequencer" id="sequencer">
            <div class="seq-header">
                <span class="seq-title">BP MOTIVE</span>
                <div class="seq-controls">
                    <label class="seq-bpm-wrap">
                        <span class="seq-bpm-label">BPM</span>
                        <input type="number" id="seq-bpm" min="20" max="300" value="120" step="1">
                    </label>
                    <button id="seq-play" disabled>PLAY</button>
                </div>
                <span class="seq-ch-label">CH1 pitch · CH2 gate</span>
            </div>
            <div class="seq-steps" id="seq-steps"></div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
